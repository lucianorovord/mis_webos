name: Deploy(Remoto)
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (Remoto)
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}

          script: |
            sudo set -e
            sudo git config --global --add safe.directory /var/www/mis_webos
            sudo cd /var/www/mis_webos
            sudo git pull